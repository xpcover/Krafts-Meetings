name: vexa
services:
  # --- Infrastructure ---

  redis:
    image: redis:7.0-alpine
    mem_limit: 512m
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - vexa
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    # idle_in_transaction_session_timeout=60s auto-kills orphaned transactions
    # (defense-in-depth against future DB session leaks in meeting-api).
    command: ["postgres", "-c", "idle_in_transaction_session_timeout=60000"]
    environment:
      - POSTGRES_DB=${DB_NAME:-vexa}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5458}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vexa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vexa
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    mem_limit: 1g
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    ports:
      # v0.10.5.3 Pack D-3 follow-up (Option B):
      # MINIO_HOST_BIND defaults to 127.0.0.1 (safe — only the host can reach
      # MinIO; presigned URLs only work for browsers running on the host).
      # For external-browser audio playback (e.g. dashboard accessed from a
      # remote machine), set MINIO_HOST_BIND=0.0.0.0 + set MINIO_PUBLIC_ENDPOINT
      # to e.g. http://<host-public-ip>:${MINIO_HOST_PORT}. The presigned URL
      # signature uses MINIO_PUBLIC_ENDPOINT; without that env, presigned URLs
      # carry the in-network hostname `minio:9000` which only resolves inside
      # the docker bridge network.
      - "${MINIO_HOST_BIND:-127.0.0.1}:${MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - vexa
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        mc alias set vexa http://minio:9000 $${MINIO_ROOT_USER:-vexa-access-key} $${MINIO_ROOT_PASSWORD:-vexa-secret-key}
        mc mb --ignore-existing vexa/${MINIO_BUCKET:-vexa}
        exit 0
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    networks:
      - vexa

  # --- Core services ---

  admin-api:
    build:
      context: ../..
      dockerfile: services/admin-api/Dockerfile
    image: vexaai/admin-api:${IMAGE_TAG}
    ports:
      - "127.0.0.1:${ADMIN_API_PORT:-8057}:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - ADMIN_API_TOKEN=${ADMIN_TOKEN:-changeme}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vexa
    restart: unless-stopped

  runtime-api:
    build:
      context: ../../services/runtime-api
      dockerfile: Dockerfile
    image: vexaai/runtime-api:${IMAGE_TAG}
    group_add:
      - "${DOCKER_GID:-998}"
    ports:
      - "127.0.0.1:${RUNTIME_API_PORT:-8090}:8090"
    environment:
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-vexa}_vexa
      - AGENT_IMAGE=${AGENT_IMAGE}
      - BROWSER_IMAGE=${BROWSER_IMAGE}
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa}
      - CLAUDE_CREDENTIALS_PATH=${CLAUDE_CREDENTIALS_PATH}
      - CLAUDE_JSON_PATH=${CLAUDE_JSON_PATH}
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - API_KEYS=${BOT_API_TOKEN:-}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - PROFILES_PATH=/app/profiles.yaml
      - ALLOW_PRIVATE_CALLBACKS=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../services/runtime-api/profiles.yaml:/app/profiles.yaml:ro
    init: true
    depends_on:
      - redis
      - postgres
    networks:
      - vexa
    restart: unless-stopped

