  mcp:
    build:
      context: ../..
      dockerfile: services/mcp/Dockerfile
    image: vexaai/mcp:${IMAGE_TAG}
    mem_limit: 512m
    ports:
      - "127.0.0.1:${MCP_HOST_PORT:-18888}:18888"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    init: true
    depends_on:
      - api-gateway
    networks:
      - vexa
    restart: unless-stopped

  dashboard:
    build:
      context: ../..
      dockerfile: services/dashboard/Dockerfile
      # v0.10.5.3 Pack D-1 follow-up: thread version through to the
      # prebuild generator. The chart yaml isn't in the dashboard build
      # context (build context is repo root, but the script runs from
      # /app inside the image), so we provide the version as a build-arg.
      # VEXA_VERSION is read from the .env file by docker compose.
      args:
        NEXT_PUBLIC_VEXA_OSS_VERSION: ${VEXA_VERSION:-dev}
        NEXT_PUBLIC_VEXA_OSS_RELEASE_DATE: ${VEXA_RELEASE_DATE:-}
    image: vexaai/dashboard:${IMAGE_TAG}
    mem_limit: 1g
    ports:
      - "${DASHBOARD_HOST_PORT:-3001}:3000"
    environment:
      - VEXA_API_URL=http://api-gateway:8000
      - VEXA_PUBLIC_API_URL=${VEXA_PUBLIC_API_URL:-}
      - API_GATEWAY_HOST_PORT=${API_GATEWAY_HOST_PORT:-8056}
      - VEXA_API_KEY=${VEXA_API_KEY:-}
      - VEXA_ADMIN_API_KEY=${ADMIN_API_TOKEN:-changeme}
      - VEXA_ADMIN_API_URL=http://admin-api:8001
      - JWT_SECRET=${JWT_SECRET:-vexa-dev-jwt-secret}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
    init: true
    depends_on:
      - api-gateway
    networks:
      - vexa
    restart: unless-stopped

  tts-service:
    build:
      context: ../..
      dockerfile: services/tts-service/Dockerfile
    image: vexaai/tts-service:${IMAGE_TAG}
    mem_limit: 1g
    expose:
      - "8002"
    environment:
      - TTS_API_TOKEN=${TTS_API_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - tts-voices:/app/voices
    init: true
    networks:
      - vexa
    restart: unless-stopped

  workflow-api:
    build:
      context: ../..
      dockerfile: services/workflow-api/Dockerfile
    image: vexaai/workflow-api:${IMAGE_TAG}
    mem_limit: 512m
    ports:
      - "127.0.0.1:${WORKFLOW_API_PORT:-8060}:8060"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - WORKFLOW_INIT_DB_ON_STARTUP=${WORKFLOW_INIT_DB_ON_STARTUP:-true}
      - WORKFLOW_ENCRYPTION_KEY=${WORKFLOW_ENCRYPTION_KEY:-}
      - WORKFLOW_OAUTH_STATE_SECRET=${WORKFLOW_OAUTH_STATE_SECRET:-}
      - WORKFLOW_PUBLIC_BASE_URL=${WORKFLOW_PUBLIC_BASE_URL:-http://localhost:8060}
      - VEXA_API_URL=${VEXA_API_URL:-http://api-gateway:8000}
      - VEXA_API_KEY=${VEXA_API_KEY:-}
      - WORKFLOW_VEXA_WEBHOOK_SECRET=${WORKFLOW_VEXA_WEBHOOK_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_TLS_MODE=${SMTP_TLS_MODE:-starttls}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8060/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_started
    networks:
      - vexa
    restart: unless-stopped

  # calendar-service: NO-SHIP for 0.10 — not included in release
